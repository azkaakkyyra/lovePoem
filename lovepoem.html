<!DOCTYPE html><html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LovePoem</title>  <!-- Romantic Fonts -->  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400&family=Playfair+Display&display=swap" rel="stylesheet">  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #2c2c54);
      color: #f1f1f1;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }

    .container {
      max-width: 800px;
      padding: 30px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
      position: relative;
    }

    h1 {
      text-align: center;
      margin-bottom: 5px;
      font-size: 40px;
      letter-spacing: 2px;
      font-family: 'Great Vibes', cursive;
      opacity: 0;
      animation: fadeIn 2s ease forwards, glow 2s infinite alternate;
    }

    .subtitle {
      text-align: center;
      font-size: 18px;
      margin-bottom: 20px;
      font-family: 'Playfair Display', serif;
      opacity: 0;
      animation: fadeIn 3s ease forwards;
    }

    .heart {
      display: inline-block;
      animation: heartbeat 1s infinite;
    }

    .broken {
      animation: breakHeart 2s infinite;
    }

    p {
      line-height: 1.9;
      font-size: 16px;
      text-align: justify;
      white-space: pre-wrap;
      font-family: 'Poppins', sans-serif;
    }

    .star {
      position: absolute;
      font-size: 24px;
      animation: blink 1.5s infinite;
    }

    .star.top-right {
      top: 10px;
      right: 15px;
    }

    .star.bottom-left {
      bottom: 10px;
      left: 15px;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    @keyframes glow {
      from { text-shadow: 0 0 5px #fff; }
      to { text-shadow: 0 0 20px #ffb6c1; }
    }

    @keyframes blink {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

    @keyframes breakHeart {
      0% { opacity: 1; }
      50% { opacity: 0.3; }
      100% { opacity: 1; }
    }
  </style></head>
<body>
  <div class="container">
    <div class="star top-right">✨</div>
    <div class="star bottom-left">✨</div><h1>Hai Elysia ✨</h1>
<div class="subtitle">here's a poem for you <span class="heart">❤️</span><span class="heart broken">💔</span></div>

<p id="text"></p>

  </div>  <script>
    const text = `Di balik kaca yang berpendar tipis, aku melihat lelah yang kamu sembunyikan rapat-rapat. Kamu adalah teka-teki yang senang dijaga, dengan pagar tinggi yang kamu beri nama “tak mudah”. Aku berdiri di ambang pintu yang terbuka setengah, menjadi telinga bagi riuh rendah dunia yang kamu bagi, mendengarkan jejak-jejak yang pernah singgah tentang mereka yang datang dan pergi membawa cerita. Aku menyimak setiap tawa yang lewat, meski kadang ada duri di balik nada yang kamu kirimkan. Ada kegundahan yang kupendam sendiri, seperti gemuruh di langit yang tak kunjung menjadi hujan. Ingin sekali aku menjadi penenang bagi matamu yang redup, namun aku sadar, aku pun masih sibuk merakit tenang untuk diri sendiri. Jadi, biar kusimpan dulu ingin yang terlalu lancang ini; biarlah aku menjadi sunyi yang paling nyaman bagimu. Di antara salam dan sapa yang tak pernah terlewat, mungkin takdirku untuk bersyukur sebagai pengamat, sebab aku tahu beberapa keindahan memang diciptakan hanya untuk dikagumi tanpa pernah benar-benar dimiliki.`;

    let index = 0;
    const speed = 30;

    function typeWriter() {
      if (index < text.length) {
        document.getElementById("text").innerHTML += text.charAt(index);
        index++;
        setTimeout(typeWriter, speed);
      }
    }

    window.onload = typeWriter;
  </script></body>
</html>
